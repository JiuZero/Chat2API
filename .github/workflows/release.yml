name: Release

on:
  workflow_dispatch:   # 允许在 GitHub 网页上手动触发
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      actions: write

    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/

      - name: Build application
        run: npm run build

      - name: Build and Publish (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --${{ matrix.arch }} --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/

      - name: Build and Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --${{ matrix.arch }} --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/

      - name: Build and Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --${{ matrix.arch }} --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/

      # ==========================================
      # 新增步骤：将构建产物上传到 Actions 运行记录
      # 这样即使发布到 Releases 失败，你也能从这里下载文件
      # ==========================================
      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Chat2API-macOS-${{ matrix.arch }}
          path: dist/*.dmg

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Chat2API-Windows-${{ matrix.arch }}
          path: dist/*.exe

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Chat2API-Linux-${{ matrix.arch }}
          path: dist/*.AppImage
